services:
  - type: web
    name: stealthvault-keeper
    env: node
    plan: starter
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: POLL_INTERVAL_MS
        value: 15000
      - key: RPC_URL
        fromGroup: secrets
      - key: PRIVATE_KEY
        fromGroup: secrets
      - key: CONTRACT_ADDRESS
        fromGroup: secrets
      - key: FHE_ENV
        value: TESTNET
    healthCheckPath: /health
    
  # Optional: Add a simple health check endpoint
  - type: web
    name: stealthvault-frontend
    env: static
    plan: starter
    buildCommand: npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_CHAIN_ID
        value: "11155111"
      - key: VITE_CONTRACT_ADDRESS
        fromGroup: secrets