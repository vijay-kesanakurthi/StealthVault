<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="mainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c084fc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Hexagonal background -->
  <path fill="url(#mainGrad)" filter="url(#shadow)"
        d="M24 6L35 12v12L24 36L13 24V12L24 6z"/>
  
  <!-- Inner hexagon highlight -->
  <path fill="url(#accentGrad)" opacity="0.8"
        d="M24 10L31 14v8L24 30L17 22V14L24 10z"/>
  
  <!-- Central lock icon -->
  <g transform="translate(24,24)">
    <!-- Lock body -->
    <rect x="-5" y="-2" width="10" height="8" rx="2" fill="#1e1b4b" 
          stroke="rgba(255,255,255,0.4)" stroke-width="0.5"/>
    
    <!-- Lock shackle -->
    <path d="M-3 -2v-2.5a3 3 0 0 1 6 0V-2" stroke="#1e1b4b" 
          stroke-width="1.8" fill="none" stroke-linecap="round"/>
    
    <!-- Keyhole -->
    <circle cx="0" cy="1" r="1.2" fill="#8b5cf6"/>
    <rect x="-0.4" y="1.8" width="0.8" height="2" rx="0.4" fill="#8b5cf6"/>
  </g>
  
  <!-- Glowing particles -->
  <circle cx="12" cy="18" r="1" fill="#fbbf24" opacity="0.9">
    <animate attributeName="r" values="0.5;1.2;0.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="20" r="0.8" fill="#fbbf24" opacity="0.7">
    <animate attributeName="r" values="0.4;1;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="18" cy="36" r="0.6" fill="#fbbf24" opacity="0.8">
    <animate attributeName="r" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="30" cy="12" r="0.9" fill="#fbbf24" opacity="0.6">
    <animate attributeName="r" values="0.5;1.1;0.5" dur="2.2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.2s" repeatCount="indefinite"/>
  </circle>
</svg>