<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="eyeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Eye shape (stealth vision) -->
  <ellipse cx="24" cy="24" rx="20" ry="12" fill="url(#eyeGrad)" filter="url(#glow)" opacity="0.9"/>
  
  <!-- Inner eye -->
  <ellipse cx="24" cy="24" rx="16" ry="9" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Iris (encrypted core) -->
  <circle cx="24" cy="24" r="8" fill="url(#irisGrad)"/>
  
  <!-- Pupil (data center) -->
  <circle cx="24" cy="24" r="4" fill="#1e1b4b"/>
  
  <!-- Inner reflection -->
  <ellipse cx="22" cy="22" rx="1.5" ry="2" fill="rgba(255,255,255,0.8)"/>
  
  <!-- Scanning lines (FHE processing) -->
  <g opacity="0.6">
    <line x1="4" y1="24" x2="44" y2="24" stroke="url(#irisGrad)" stroke-width="0.5">
      <animate attributeName="opacity" values="0.2;0.8;0.2" dur="2s" repeatCount="indefinite"/>
    </line>
    <line x1="4" y1="20" x2="44" y2="20" stroke="url(#irisGrad)" stroke-width="0.3">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2.5s" repeatCount="indefinite"/>
    </line>
    <line x1="4" y1="28" x2="44" y2="28" stroke="url(#irisGrad)" stroke-width="0.3">
      <animate attributeName="opacity" values="0.8;0.2;0.8" dur="1.8s" repeatCount="indefinite"/>
    </line>
  </g>
  
  <!-- Floating encrypted particles -->
  <circle cx="8" cy="16" r="1" fill="#fbbf24" opacity="0.7">
    <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 8 16;360 8 16" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="40" cy="18" r="0.8" fill="#fbbf24" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.6;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 40 18;-360 40 18" dur="12s" repeatCount="indefinite"/>
  </circle>
  <circle cx="12" cy="32" r="0.6" fill="#fbbf24" opacity="0.8">
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="1.8s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 12 32;360 12 32" dur="8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="36" cy="30" r="0.9" fill="#fbbf24" opacity="0.5">
    <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    <animateTransform attributeName="transform" type="rotate" values="0 36 30;-360 36 30" dur="15s" repeatCount="indefinite"/>
  </circle>
</svg>