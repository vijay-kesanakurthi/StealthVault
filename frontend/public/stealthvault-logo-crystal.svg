<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="30%" style="stop-color:#6366f1"/>
      <stop offset="70%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#3730a3"/>
    </linearGradient>
    <linearGradient id="facetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge> 
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Main crystal structure -->
  <g transform="translate(24,24)" filter="url(#glow)">
    <!-- Top facet -->
    <path d="M0,-16 L8,-8 L0,0 L-8,-8 Z" fill="url(#crystalGrad)" opacity="0.9"/>
    
    <!-- Left facet -->
    <path d="M-8,-8 L0,0 L-8,8 L-16,0 Z" fill="url(#facetGrad)" opacity="0.8"/>
    
    <!-- Right facet -->
    <path d="M8,-8 L16,0 L8,8 L0,0 Z" fill="url(#facetGrad)" opacity="0.8"/>
    
    <!-- Bottom facet -->
    <path d="M0,0 L8,8 L0,16 L-8,8 Z" fill="url(#crystalGrad)" opacity="0.7"/>
    
    <!-- Inner core (encrypted data) -->
    <circle cx="0" cy="0" r="4" fill="url(#crystalGrad)" opacity="0.9"/>
    <circle cx="0" cy="0" r="2" fill="#1e1b4b"/>
    
    <!-- Facet highlights -->
    <path d="M0,-16 L4,-12 L0,-8 L-4,-12 Z" fill="rgba(255,255,255,0.3)"/>
    <path d="M-8,-8 L-4,-4 L-8,4 L-12,0 Z" fill="rgba(255,255,255,0.2)"/>
    <path d="M8,-8 L12,0 L8,4 L4,-4 Z" fill="rgba(255,255,255,0.2)"/>
  </g>
  
  <!-- Energy emanations -->
  <g opacity="0.7">
    <circle cx="24" cy="24" r="22" fill="none" stroke="url(#crystalGrad)" stroke-width="1" opacity="0.4">
      <animate attributeName="r" values="20;24;20" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="24" cy="24" r="18" fill="none" stroke="url(#facetGrad)" stroke-width="0.8" opacity="0.5">
      <animate attributeName="r" values="16;20;16" dur="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  
  <!-- Floating data fragments -->
  <g>
    <rect x="6" y="12" width="2" height="2" fill="#fbbf24" opacity="0.8" transform="rotate(45 7 13)">
      <animateTransform attributeName="transform" type="rotate" values="45 7 13;405 7 13" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="38" y="16" width="1.5" height="1.5" fill="#fbbf24" opacity="0.6" transform="rotate(30 38.75 16.75)">
      <animateTransform attributeName="transform" type="rotate" values="30 38.75 16.75;390 38.75 16.75" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0.6;0.3" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="10" y="34" width="1.2" height="1.2" fill="#fbbf24" opacity="0.7" transform="rotate(60 10.6 34.6)">
      <animateTransform attributeName="transform" type="rotate" values="60 10.6 34.6;420 10.6 34.6" dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.5;0.7;0.5" dur="1.8s" repeatCount="indefinite"/>
    </rect>
    <rect x="36" y="32" width="1.8" height="1.8" fill="#fbbf24" opacity="0.5" transform="rotate(15 36.9 32.9)">
      <animateTransform attributeName="transform" type="rotate" values="15 36.9 32.9;375 36.9 32.9" dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
</svg>