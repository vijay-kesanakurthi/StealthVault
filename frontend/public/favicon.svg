<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="50%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="facetGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#c084fc"/>
    </linearGradient>
  </defs>
  
  <!-- Main crystal structure -->
  <g transform="translate(16,16)">
    <!-- Top facet -->
    <path d="M0,-10 L5,-5 L0,0 L-5,-5 Z" fill="url(#crystalGrad)"/>
    
    <!-- Left facet -->
    <path d="M-5,-5 L0,0 L-5,5 L-10,0 Z" fill="url(#facetGrad)" opacity="0.8"/>
    
    <!-- Right facet -->
    <path d="M5,-5 L10,0 L5,5 L0,0 Z" fill="url(#facetGrad)" opacity="0.8"/>
    
    <!-- Bottom facet -->
    <path d="M0,0 L5,5 L0,10 L-5,5 Z" fill="url(#crystalGrad)" opacity="0.7"/>
    
    <!-- Inner core -->
    <circle cx="0" cy="0" r="2.5" fill="url(#crystalGrad)"/>
    <circle cx="0" cy="0" r="1.2" fill="#1e1b4b"/>
    
    <!-- Highlight -->
    <path d="M0,-10 L2.5,-7.5 L0,-5 L-2.5,-7.5 Z" fill="rgba(255,255,255,0.3)"/>
  </g>
</svg>